version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: mldp-postgres
    environment:
      POSTGRES_USER: mldp_user
      POSTGRES_PASSWORD: mldp_password
      POSTGRES_DB: mldp_research
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mldp_user -d mldp_research"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mldp-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mldp_user:mldp_password@db:5432/mldp_research
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      DEBUG: "True"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mldp-network

  # Uncomment when frontend is ready
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: mldp-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     REACT_APP_API_URL: http://localhost:8000
  #   depends_on:
  #     - backend
  #   networks:
  #     - mldp-network

volumes:
  postgres_data:

networks:
  mldp-network:
    driver: bridge
